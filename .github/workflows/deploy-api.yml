name: Deploy API to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'service/db/**'
      - '.github/workflows/deploy-api.yml'

env:
  SERVICE:  bengali-math-api
  REGION:   ${{ vars.GCP_REGION || 'us-central1' }}
  IMAGE:    gcr.io/${{ secrets.GCP_PROJECT_ID }}/bengali-math-api

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Authenticate to Google Cloud ──────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. Set up gcloud CLI ─────────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── 4. Configure Docker to use gcloud credentials ────────────────────────
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      # ── 5. Build & push image ────────────────────────────────────────────────
      - name: Build Docker image
        working-directory: service/db
        run: |
          docker build \
            --tag "${{ env.IMAGE }}:${{ github.sha }}" \
            --tag "${{ env.IMAGE }}:latest" \
            .

      - name: Push Docker image
        run: |
          docker push "${{ env.IMAGE }}:${{ github.sha }}"
          docker push "${{ env.IMAGE }}:latest"

      # ── 6. Deploy to Cloud Run ───────────────────────────────────────────────
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service:  ${{ env.SERVICE }}
          image:    ${{ env.IMAGE }}:${{ github.sha }}
          region:   ${{ env.REGION }}
          flags:    >-
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --timeout=60
          env_vars: |
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}

      # ── 7. Print service URL ─────────────────────────────────────────────────
      - name: Show deployed URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format "value(status.url)"